# ============================================================
# IMS — Incident Management System
# Services: backend · frontend · postgres · mongodb · redis
# Run: docker compose up --build
# ============================================================

networks:
  ims-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:

services:

  # ----------------------------------------------------------
  # PostgreSQL — source of truth (WorkItems + RCAs)
  # ----------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB:       ims
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ims-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # MongoDB — raw signal audit log (data lake)
  # ----------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: ims-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ims
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ims-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Redis — dashboard hot-path cache + debounce tracking
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ims-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ims-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------
  # Backend — Go / Fiber API server
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims-backend
    restart: unless-stopped
    environment:
      PORT:           "8080"
      LOG_PRETTY:     "false"
      JWT_SECRET:     "change-me-in-production-use-a-long-random-string"
      POSTGRES_DSN:   "postgres://ims:ims@postgres:5432/ims?sslmode=disable"
      MONGO_URI:      "mongodb://mongodb:27017"
      MONGO_DB:       "ims"
      REDIS_ADDR:     "redis:6379"
      REDIS_PASS:     ""
      QUEUE_CAPACITY: "50000"
      WORKER_COUNT:   "20"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims-net

  # ----------------------------------------------------------
  # Frontend — React / Vite → Nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ims-net