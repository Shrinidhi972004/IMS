# ============================================================
# IMS Helm Chart — Default Values
# Override with: helm install ims ./helm/ims -f my-values.yaml
# ============================================================

replicaCount: 2

image:
  backend:
    repository: ghcr.io/shrinidhi972004/ims-backend
    tag: latest
    pullPolicy: Always
  frontend:
    repository: ghcr.io/shrinidhi972004/ims-frontend
    tag: latest
    pullPolicy: Always

# JWT secret — override in production
jwt:
  secret: "change-me-in-production"

# Backend configuration
backend:
  port: 8080
  workerCount: 20
  queueCapacity: 50000
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Frontend configuration
frontend:
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Service configuration
service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 80

# Ingress
ingress:
  enabled: false
  className: nginx
  host: ims.example.com
  tls: []

# PostgreSQL (uses Bitnami chart in production; local config here)
postgres:
  host: postgres
  port: 5432
  database: ims
  username: ims
  password: ims

# MongoDB
mongo:
  uri: mongodb://mongodb:27017
  database: ims

# Redis
redis:
  addr: redis:6379
  password: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Pod Disruption Budget — ensures at least 1 replica during rolling updates
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ims-backend
          topologyKey: kubernetes.io/hostname
