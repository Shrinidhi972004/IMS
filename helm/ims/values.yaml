# ============================================================
# IMS Helm Chart — Default Values
# Override with: helm install ims ./helm/ims -f my-values.yaml
# ============================================================
replicaCount: 2

image:
  backend:
    repository: 009882533113.dkr.ecr.ap-south-1.amazonaws.com/ims-backend
    tag: latest
    pullPolicy: Always
  frontend:
    repository: 009882533113.dkr.ecr.ap-south-1.amazonaws.com/ims-frontend
    tag: latest
    pullPolicy: Always

# JWT secret — override in production
jwt:
  secret: "change-me-in-production"

# Backend configuration
backend:
  port: 8080
  workerCount: 20
  queueCapacity: 50000
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Frontend configuration
frontend:
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Service configuration
service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 80

# Ingress
ingress:
  enabled: false
  className: nginx
  host: ims.example.com
  tls: []

# PostgreSQL — set enabled: false when using RDS
postgres:
  enabled: false
  host: ims-dev-postgres.c5uw48a4en61.ap-south-1.rds.amazonaws.com
  port: 5432
  database: ims
  username: imsadmin
  password: "ImsSecure2025!"

# MongoDB — set enabled: false when using DocumentDB
mongo:
  enabled: false
  uri: "mongodb://imsadmin:ImsSecure2025%21@ims-dev-docdb.cluster-c5uw48a4en61.ap-south-1.docdb.amazonaws.com:27017/?replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false"
  database: ims

mongodb:
  enabled: false

# Redis — set enabled: false when using ElastiCache
redis:
  enabled: false
  addr: "ims-dev-redis.0objtq.0001.aps1.cache.amazonaws.com:6379"
  password: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ims-backend
          topologyKey: kubernetes.io/hostname